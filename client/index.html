<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Inventory MVP - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container auth-container">
        <h1>Inventory System</h1>
        
        <div id="login-form">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="login()">Login</button>
            <p>Don't have an account? <a href="#" onclick="toggleAuth()">Sign up</a></p>
        </div>

        <div id="signup-form" style="display: none;">
            <h2>Sign Up</h2>
            <input type="text" id="signup-org" placeholder="Organization Name">
            <input type="email" id="signup-email" placeholder="Email">
            <input type="password" id="signup-password" placeholder="Password">
            <button onclick="signup()">Sign Up</button>
            <p>Already have an account? <a href="#" onclick="toggleAuth()">Login</a></p>
        </div>
    </div>

    <script>
        // Check if already logged in
        if (localStorage.getItem('userId')) {
            window.location.href = 'dashboard.html';
        }

        function toggleAuth() {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch(`/api/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('userId', data.id);
                    localStorage.setItem('orgName', data.org_name);
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert('Error logging in');
            }
        }

        async function signup() {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const orgName = document.getElementById('signup-org').value;
            try {
                const res = await fetch(`/api/signup`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password, orgName})
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('userId', data.id);
                    localStorage.setItem('orgName', data.orgName);
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert('Error signing up');
            }
        }
    </script>
</body>
</html>
