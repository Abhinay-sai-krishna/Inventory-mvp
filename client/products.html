<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand" id="org-name-display">Inventory</div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="products.html" class="active">Products</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="flex-between">
            <h2>Manage Products</h2>
            <button class="btn-primary" onclick="showAddModal()">+ Add Product</button>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>SKU</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="product-list">
                <!-- Products will be loaded here -->
            </tbody>
        </table>
    </div>

    <!-- Add/Edit Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Add Product</h3>
            <input type="hidden" id="prod-id">
            <input type="text" id="prod-name" placeholder="Product Name" required>
            <input type="text" id="prod-sku" placeholder="SKU" required>
            <input type="number" id="prod-quantity" placeholder="Quantity" required>
            <input type="number" step="0.01" id="prod-price" placeholder="Price ($)" required>
            <div class="modal-actions">
                <button onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="saveProduct()">Save</button>
            </div>
        </div>
    </div>

    <script>
        const userId = localStorage.getItem('userId');
        if (!userId) window.location.href = 'index.html';
        
        document.getElementById('org-name-display').innerText = localStorage.getItem('orgName') + ' Inventory';

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        let products = [];

        async function loadProducts() {
            try {
                const res = await fetch('/api/products', { headers: { 'user-id': userId } });
                if (res.ok) {
                    products = await res.json();
                    renderTable();
                }
            } catch (e) {
                console.error(e);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('product-list');
            tbody.innerHTML = '';
            
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">No products found. Add one!</td></tr>';
                return;
            }

            products.forEach(p => {
                const isLow = p.quantity <= 10;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${p.name}</td>
                    <td>${p.sku}</td>
                    <td class="${isLow ? 'text-danger' : ''}"><strong>${p.quantity}</strong></td>
                    <td>$${p.price.toFixed(2)}</td>
                    <td>
                        <button onclick="editProduct(${p.id})">Edit</button>
                        <button class="btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Modal Logic
        const modal = document.getElementById('product-modal');
        function showAddModal() {
            document.getElementById('modal-title').innerText = 'Add Product';
            document.getElementById('prod-id').value = '';
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-sku').value = '';
            document.getElementById('prod-quantity').value = '';
            document.getElementById('prod-price').value = '';
            modal.style.display = 'flex';
        }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            document.getElementById('modal-title').innerText = 'Edit Product';
            document.getElementById('prod-id').value = p.id;
            document.getElementById('prod-name').value = p.name;
            document.getElementById('prod-sku').value = p.sku;
            document.getElementById('prod-quantity').value = p.quantity;
            document.getElementById('prod-price').value = p.price;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        async function saveProduct() {
            const id = document.getElementById('prod-id').value;
            const payload = {
                name: document.getElementById('prod-name').value,
                sku: document.getElementById('prod-sku').value,
                quantity: parseInt(document.getElementById('prod-quantity').value, 10),
                price: parseFloat(document.getElementById('prod-price').value)
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/products/${id}` : '/api/products';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'user-id': userId 
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    closeModal();
                    loadProducts();
                } else {
                    alert('Error saving product');
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;
            try {
                const res = await fetch(`/api/products/${id}`, {
                    method: 'DELETE',
                    headers: { 'user-id': userId }
                });
                if (res.ok) loadProducts();
            } catch (e) {
                console.error(e);
            }
        }

        loadProducts();
    </script>
</body>
</html>
